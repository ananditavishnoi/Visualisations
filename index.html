<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>loss of brain</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020204; overflow: hidden; }
  #label {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.12);
    font-family: 'Courier New', monospace;
    font-size: 10px; letter-spacing: 0.3em;
    text-transform: lowercase; pointer-events: none;
  }
  #hint {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.10);
    font-family: 'Courier New', monospace;
    font-size: 9px; letter-spacing: 0.25em;
    text-transform: lowercase; pointer-events: none;
    transition: opacity 1.5s;
  }
</style>
</head>
<body>
<div id="label">loss of brain</div>
<div id="hint">hold to breathe</div>
<script>
new p5(function(p) {
 
  // ── palette ───────────────────────────────────────────────
  var HOT  = [[8,15,90],[0,55,200],[0,130,230],[0,210,210],[0,200,70],[100,220,0],[230,230,0],[255,150,0],[255,60,0],[230,10,10]];
  var CALM = [[2,5,40],[0,20,80],[0,50,130],[0,80,160],[0,110,190],[0,140,210],[0,160,220],[0,180,230],[10,200,240],[40,220,255]];
 
  function lerpPal(pal, t) {
    t = Math.max(0, Math.min(0.9999, t));
    var i = Math.floor(t * (pal.length - 1));
    var f = t * (pal.length - 1) - i;
    var a = pal[i], b = pal[i+1];
    return [a[0]+(b[0]-a[0])*f, a[1]+(b[1]-a[1])*f, a[2]+(b[2]-a[2])*f];
  }
 
  function petCol(heat, calm) {
    var h = lerpPal(HOT,  heat);
    var c = lerpPal(CALM, heat * 0.6);
    return [h[0]+(c[0]-h[0])*calm, h[1]+(c[1]-h[1])*calm, h[2]+(c[2]-h[2])*calm];
  }
 
  // ── globals ───────────────────────────────────────────────
  var holding     = false;
  var calmLevel   = 0;
  var breathPhase = 0;
  var breathAmt   = 0;   // 0..1 smooth chest
  var blinkT      = 0;
  var blinkDur    = 12;
  var nextBlink   = 200;
  var eyeOpen     = 1;   // 1=open 0=closed
 
  // ── nodes ─────────────────────────────────────────────────
  var nodes = [];
  var N = 180;
 
  function makeNode(fast, anywhere) {
    var nd = {};
    nd.fast    = fast;
    nd.r       = fast ? p.random(2, 4) : p.random(2.5, 7);
    nd.heat    = p.random(0.1, 1.0);
    nd.nt      = p.random(1000);  // noise time
    nd.pt      = p.random(1000);  // pulse time
    nd.axon    = fast ? p.random(25, 55) : p.random(45, 100);
    nd.stream  = p.random() < 0.6;
    var spd    = fast ? p.random(2.8, 5.2) : p.random(0.4, 1.8);
 
    if (nd.stream) {
      nd.dir   = p.random() < 0.5 ? 1 : -1;
      nd.sx    = spd * nd.dir;
      nd.sy    = p.random(-0.25, 0.25) * (fast ? 2 : 1);
    } else {
      var ang  = p.random(p.TWO_PI);
      nd.vx    = Math.cos(ang) * spd * 0.7;
      nd.vy    = Math.sin(ang) * spd * 0.7;
    }
 
    if (anywhere) {
      nd.x = p.random(p.width);
      nd.y = p.random(p.height);
    } else {
      if (!nd.stream) {
        var e = Math.floor(p.random(4));
        if      (e===0) { nd.x = p.random(p.width);  nd.y = -10; }
        else if (e===1) { nd.x = p.width+10;          nd.y = p.random(p.height); }
        else if (e===2) { nd.x = p.random(p.width);  nd.y = p.height+10; }
        else            { nd.x = -10;                 nd.y = p.random(p.height); }
      } else {
        nd.x = nd.dir > 0 ? -10 : p.width+10;
        nd.y = p.random(p.height);
      }
    }
    return nd;
  }
 
  function updateNode(nd, cx, cy) {
    nd.nt += nd.fast ? 0.012 : 0.006;
    nd.pt += 0.04;
    var sf = nd.fast ? (1 - calmLevel*0.35) : (1 - calmLevel*0.75);
 
    if (nd.stream) {
      nd.x += (nd.sx + (p.noise(nd.nt)     - 0.5) * 0.8) * sf;
      nd.y += (nd.sy + (p.noise(nd.nt+300) - 0.5) * 0.5) * sf;
    } else {
      nd.vx += (p.noise(nd.nt)     - 0.5) * 0.15;
      nd.vy += (p.noise(nd.nt+400) - 0.5) * 0.15;
      var spd = Math.sqrt(nd.vx*nd.vx + nd.vy*nd.vy);
      var cap = nd.fast ? 5 : 1.8;
      if (spd > cap) { nd.vx *= 0.88; nd.vy *= 0.88; }
      nd.x += nd.vx * sf;
      nd.y += nd.vy * sf;
    }
 
    // heat shift toward calm blue
    if (calmLevel > 0.05) {
      nd.heat += (0.15 - nd.heat) * calmLevel * 0.015;
    } else {
      nd.heat += (p.noise(nd.nt+700) - nd.heat) * 0.003;
      nd.heat  = Math.max(0.1, Math.min(1.0, nd.heat));
    }
 
    // avoid face zone
    var dx = nd.x - cx, dy = nd.y - cy;
    var dist = Math.sqrt(dx*dx + dy*dy) || 1;
    var avoid = 55 + breathAmt * 16;
    if (dist < avoid) {
      var push = (avoid - dist) / avoid;
      nd.x += (dx/dist) * push * 3;
      nd.y += (dy/dist) * push * 3;
    }
 
    // respawn if off screen
    var m = 60;
    if (nd.x > p.width+m || nd.x < -m || nd.y > p.height+m || nd.y < -m) {
      var fresh = makeNode(nd.fast, false);
      Object.assign(nd, fresh);
    }
  }
 
  function drawNode(nd) {
    var col   = petCol(nd.heat, calmLevel);
    var r=col[0], g=col[1], b=col[2];
    var pulse = 0.7 + Math.sin(nd.pt) * 0.25;
    var ba    = nd.fast ? 110 : 165;
    var alpha = ba * pulse;
 
    // axons
    for (var i=0; i<nodes.length; i++) {
      var other = nodes[i];
      if (other === nd) continue;
      var dx = other.x - nd.x, dy = other.y - nd.y;
      var d  = Math.sqrt(dx*dx + dy*dy);
      if (d < nd.axon) {
        var str = 1 - d/nd.axon;
        var oc  = petCol(other.heat, calmLevel);
        var axA = (nd.fast ? 28 : 55) * str * pulse;
        p.stroke((r+oc[0])/2, (g+oc[1])/2, (b+oc[2])/2, axA);
        p.strokeWeight(nd.fast ? 0.3 : 0.4 + str*0.7);
        var mx = (nd.x+other.x)/2 + (p.noise(nd.nt+700)-0.5)*16;
        var my = (nd.y+other.y)/2 + (p.noise(nd.nt+800)-0.5)*16;
        p.noFill();
        p.beginShape();
        p.vertex(nd.x, nd.y);
        p.quadraticVertex(mx, my, other.x, other.y);
        p.endShape();
      }
    }
 
    p.noStroke();
    p.fill(r,g,b, (nd.fast?14:20)*pulse); p.ellipse(nd.x,nd.y, nd.r*5, nd.r*5);
    p.fill(r,g,b, (nd.fast?40:60)*pulse); p.ellipse(nd.x,nd.y, nd.r*2.6, nd.r*2.6);
    p.fill(r,g,b, alpha);                 p.ellipse(nd.x,nd.y, nd.r*1.5, nd.r*1.5);
    p.fill(255,255,255, (nd.fast?30:50)*pulse); p.ellipse(nd.x,nd.y, nd.r*0.5, nd.r*0.5);
  }
 
  // ── background web ────────────────────────────────────────
  var bgN = [];
  function buildBg() {
    bgN = [];
    for (var i=0; i<70; i++) {
      bgN.push({
        x: p.random(p.width), y: p.random(p.height),
        r: p.random(1.2, 3), heat: p.random(0, 0.5),
        nt: p.random(1000),
        vx: (p.random()-0.5)*0.25, vy: (p.random()-0.5)*0.25
      });
    }
  }
 
  function drawBg() {
    for (var i=0; i<bgN.length; i++) {
      var nd = bgN[i];
      nd.nt += 0.002;
      nd.x  += nd.vx*(1-calmLevel*0.6) + (p.noise(nd.nt)-0.5)*0.15;
      nd.y  += nd.vy*(1-calmLevel*0.6) + (p.noise(nd.nt+500)-0.5)*0.15;
      if (nd.x<0) nd.x=p.width;  if (nd.x>p.width)  nd.x=0;
      if (nd.y<0) nd.y=p.height; if (nd.y>p.height) nd.y=0;
      var col=petCol(nd.heat*(1-calmLevel*0.6), calmLevel);
      var a=8+p.noise(nd.nt)*12;
      for (var j=0; j<bgN.length; j++) {
        var o=bgN[j];
        var dx=o.x-nd.x, dy=o.y-nd.y, d=Math.sqrt(dx*dx+dy*dy);
        if (d<95) { p.stroke(col[0],col[1],col[2],(1-d/95)*9); p.strokeWeight(0.3); p.line(nd.x,nd.y,o.x,o.y); }
      }
      p.noStroke(); p.fill(col[0],col[1],col[2],a); p.ellipse(nd.x,nd.y,nd.r*2,nd.r*2);
    }
  }
 
  // ── face ──────────────────────────────────────────────────
  function drawFace(cx, cy) {
    var calm = calmLevel;
    var eo   = eyeOpen;
 
    // calm glow
    if (calm > 0.05) {
      var gr = 80 + calm*60 + breathAmt*12;
      for (var rr=gr; rr>10; rr-=14) {
        var a = calm*7*(1-rr/gr);
        p.noStroke(); p.fill(40,160,255,a);
        p.ellipse(cx, cy, rr*1.1, rr*1.55);
      }
    }
 
    // ghost face oval
    p.noFill();
    p.stroke(255,255,255, 14+calm*12);
    p.strokeWeight(0.5);
    p.ellipse(cx, cy, 42+breathAmt*8, 54+breathAmt*10);
 
    // eyes
    var eyeY = cy - 6;
    var eyeX = [cx-11, cx+11];
    var ew   = 10;  // eye width
    var eh   = 5.5 * eo; // eye height scales with openness
 
    // breath ripple
    if (calm > 0.15 && breathAmt > 0.3) {
      var ripA = calm * breathAmt * 24;
      p.noFill();
      p.stroke(255,255,255,ripA);    p.strokeWeight(0.4); p.ellipse(cx,cy,110+breathAmt*24,140+breathAmt*20);
      p.stroke(255,255,255,ripA*0.4);p.strokeWeight(0.3); p.ellipse(cx,cy,160+breathAmt*34,200+breathAmt*28);
    }
 
    for (var e=0; e<2; e++) {
      var ex = eyeX[e];
 
      if (eo < 0.06) {
        // closed — thin line
        p.stroke(255,255,255,60); p.strokeWeight(0.8);
        p.line(ex-ew/2, eyeY, ex+ew/2, eyeY);
        continue;
      }
 
      // upper lid
      p.noFill();
      p.stroke(255,255,255, 115+calm*55);
      p.strokeWeight(1.0+calm*0.4);
      p.beginShape();
      for (var k=0; k<=20; k++) {
        var tt = k/20;
        p.vertex(ex - ew/2 + ew*tt, eyeY - eh*4*tt*(1-tt));
      }
      p.endShape();
 
      // lower lid
      p.stroke(255,255,255, 65+calm*35);
      p.strokeWeight(0.6);
      p.beginShape();
      for (var k=0; k<=20; k++) {
        var tt = k/20;
        p.vertex(ex - ew/2 + ew*tt, eyeY + eh*2.2*tt*(1-tt));
      }
      p.endShape();
 
      // iris
      if (eo > 0.4) {
        var ia = (eo-0.4)/0.6;
        p.noFill();
        p.stroke(255,255,255, 38*ia+calm*28); p.strokeWeight(0.5);
        p.ellipse(ex, eyeY - eh*0.15, eh*1.1*eo, eh*1.1*eo);
        p.noStroke(); p.fill(255,255,255, 52*ia+calm*22);
        p.ellipse(ex, eyeY - eh*0.15, eh*0.35*eo, eh*0.35*eo);
      }
    }
 
    // nostrils
    if (eo > 0.3) {
      var na = (eo-0.3)/0.7 * (14+calm*8);
      p.noStroke(); p.fill(255,255,255,na);
      p.ellipse(cx-3, cy+9,  2.5, 1.8);
      p.ellipse(cx+3, cy+9,  2.5, 1.8);
    }
 
    // mouth
    p.noFill();
    p.stroke(255,255,255, 9+calm*18+eo*6);
    p.strokeWeight(0.5);
    p.beginShape();
    for (var k=0; k<=16; k++) {
      var tt = k/16;
      p.vertex(cx-8+16*tt, cy+19 + Math.sin(tt*Math.PI)*2.8*(1+calm*0.8));
    }
    p.endShape();
  }
 
  // ── setup ─────────────────────────────────────────────────
  p.setup = function() {
    var cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    buildBg();
    var nFast = Math.floor(N * 0.15);
    for (var i=0; i<N; i++) nodes.push(makeNode(i < nFast, true));
 
    document.addEventListener('mousedown',  function(){ holding=true; });
    document.addEventListener('mouseup',    function(){ holding=false; });
    document.addEventListener('touchstart', function(e){ e.preventDefault(); holding=true; }, {passive:false});
    document.addEventListener('touchend',   function(){ holding=false; });
  };
 
  // ── draw ──────────────────────────────────────────────────
  p.draw = function() {
    p.background(2, 2, 6, 255);
 
    var cx = p.width  / 2;
    var cy = p.height / 2;
 
    // calm + breath
    if (holding) {
      calmLevel   += (1 - calmLevel) * 0.018;
      breathPhase += 0.025;
    } else {
      calmLevel   += (0 - calmLevel) * 0.012;
      breathPhase += 0.008;
    }
    var rawBreath = (Math.sin(breathPhase) + 1) / 2;
    breathAmt += (rawBreath * calmLevel - breathAmt) * 0.08;
 
    // blink
    blinkT++;
    if (blinkT >= nextBlink) {
      blinkT    = 0;
      nextBlink = p.random(120, 300) + calmLevel * 180;
    }
    if (blinkT < blinkDur) {
      var bt = blinkT / blinkDur;
      eyeOpen = bt < 0.5 ? 1 - bt*2 : (bt-0.5)*2;
    } else {
      eyeOpen = 1;
    }
    eyeOpen = eyeOpen * (1 - calmLevel*0.15);
 
    drawBg();
    for (var i=0; i<nodes.length; i++) updateNode(nodes[i], cx, cy);
    for (var i=0; i<nodes.length; i++) drawNode(nodes[i]);
    drawFace(cx, cy);
 
    // scanlines
    p.noStroke();
    for (var y=0; y<p.height; y+=3) { p.fill(0,0,0,20); p.rect(0,y,p.width,1); }
 
    // vignette
    for (var r=p.width*0.95; r>p.width*0.25; r-=16) {
      var a = p.map(r, p.width*0.25, p.width*0.95, 10, 0);
      p.noStroke(); p.fill(0,0,0,a);
      p.ellipse(cx, cy, r, r*(p.height/p.width)*1.3);
    }
 
    var hint = document.getElementById('hint');
    if (hint) hint.style.opacity = p.frameCount > 180 ? '0' : '1';
  };
 
  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    buildBg();
  };
 
});
</script>
</body>
</html>
